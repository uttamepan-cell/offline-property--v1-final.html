<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DLC Calculator - Beawar (Fresh Data)</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f4f7f9; padding: 15px; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; }
        
        .selector-box { background: #eef6ff; padding: 20px; border-radius: 10px; border: 1px solid #cce5ff; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        
        label { font-weight: bold; color: #444; display: block; margin-bottom: 5px; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; box-sizing: border-box; }
        
        .check-group { background: #fff8e1; padding: 12px; border-radius: 8px; border: 1px solid #ffe082; margin: 15px 0; display: flex; align-items: center; gap: 10px; font-weight: 500; }
        .check-group input { width: auto; }

        .result-box { margin-top: 25px; background: #2c3e50; color: white; padding: 20px; border-radius: 10px; display: none; }
        .res-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #455a64; }
        .res-row:last-child { border: none; font-size: 20px; color: #4caf50; font-weight: bold; margin-top: 10px; }
        
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2>DLC Rate & Stamp Duty Calculator</h2>

    <div class="selector-box">
        <div class="grid">
            <div>
                <label>Area Type (क्षेत्र चुनें)</label>
                <select id="scope" onchange="initData()">
                    <option value="">-- Select --</option>
                    <option value="urban">Urban (शहरी)</option>
                    <option value="rural">Rural (ग्रामीण)</option>
                </select>
            </div>
            <div>
                <label>Buyer Category (क्रेता)</label>
                <select id="category" onchange="calculate()">
                    <option value="male">Male (6%)</option>
                    <option value="female">Female (5%)</option>
                    <option value="female_sc">Female SC/ST (4%)</option>
                    <option value="disabled">Disabled (4%)</option>
                    <option value="trans">Transgender / BPL (1%)</option>
                </select>
            </div>
        </div>
    </div>

    <div class="grid">
        <div>
            <label id="lblV">City / Village</label>
            <select id="village" onchange="filterColony()"></select>
        </div>
        <div>
            <label id="lblC">Ward / Colony</label>
            <select id="colony" onchange="filterType()"></select>
        </div>
    </div>

    <div class="grid">
        <div>
            <label>Property Type</label>
            <select id="ptype" onchange="filterAreaType()"></select>
        </div>
        <div>
            <label>Road Width / Area Type</label>
            <select id="atype" onchange="setRate()"></select>
        </div>
    </div>

    <div class="check-group">
        <input type="checkbox" id="isConstructed" onchange="calculate()">
        <label for="isConstructed">Is Property Constructed? (क्या मकान बना हुआ है?)</label>
    </div>

    <div class="grid">
        <div>
            <label>Total Area (Hectare/SqMt)</label>
            <input type="number" id="areaInput" placeholder="Enter Area" oninput="calculate()">
        </div>
        <div>
            <label>DLC Rate</label>
            <input type="number" id="rateDisplay" readonly style="background:#f1f2f6">
        </div>
    </div>

    <div id="resultBox" class="result-box">
        <div class="res-row"><span>Market Value:</span> <span id="resVal">₹0</span></div>
        <div class="res-row"><span>Stamp Duty:</span> <span id="resStamp">₹0</span></div>
        <div class="res-row"><span>Surcharge:</span> <span id="resSur">₹0</span></div>
        <div class="res-row"><span>Registration Fee:</span> <span id="resReg">₹0</span></div>
        <div class="res-row"><span>SI Fee:</span> <span id="resSI">₹0</span></div>
        <div class="res-row"><span>CSI Fee:</span> <span>₹500</span></div>
        <div class="res-row"><span>Total Payable:</span> <span id="resTotal">₹0</span></div>
    </div>
</div>

const scS = document.getElementById("scope"), vS = document.getElementById("village"),
      cS = document.getElementById("colony"), tS = document.getElementById("ptype"),
      aS = document.getElementById("atype"), rD = document.getElementById("rateDisplay"),
      areaI = document.getElementById("areaInput");

function initData() {
    let s = scS.value;
    if(!s) return;
    
    document.getElementById("lblV").innerText = (s === "urban") ? "Select City" : "Select Village";
    document.getElementById("lblC").innerText = (s === "urban") ? "Select Ward/Colony" : "Select Area";

    let villages = [...new Set(db.filter(d => d.s === s).map(d => d.v))].sort();
    vS.innerHTML = villages.map(x => `<option value="${x}">${x}</option>`).join('');
    filterColony();
}

function filterColony() {
    let s = scS.value;
    let list = [...new Set(db.filter(d => d.s === s && d.v === vS.value).map(d => d.c))].sort();
    cS.innerHTML = list.map(x => `<option value="${x}">${x}</option>`).join('');
    filterType();
}

function filterType() {
    let s = scS.value;
    let list = [...new Set(db.filter(d => d.s === s && d.v === vS.value && d.c === cS.value).map(d => d.t))];
    tS.innerHTML = list.map(x => `<option value="${x}">${x}</option>`).join('');
    filterAreaType();
}

function filterAreaType() {
    let s = scS.value;
    let list = db.filter(d => d.s === s && d.v === vS.value && d.c === cS.value && d.t === tS.value);
    aS.innerHTML = list.map(x => `<option value="${x.a}">${x.a}</option>`).join('');
    setRate();
}

function setRate() {
    let s = scS.value;
    let item = db.find(d => d.s === s && d.v === vS.value && d.c === cS.value && d.t === tS.value && d.a === aS.value);
    rD.value = item ? item.r : 0;
    calculate();
}

function calculate() {
    let val = (parseFloat(areaI.value) || 0) * (parseFloat(rD.value) || 0);
    if(val <= 0) { document.getElementById("resultBox").style.display = "none"; return; }

    let isConst = document.getElementById("isConstructed").checked;
    let si = isConst ? (val <= 4999999 ? 1000 : (val <= 9999999 ? 2000 : 3000)) 
                     : (val <= 4999999 ? 500 : (val <= 9999999 ? 1500 : 2500));

    let cat = document.getElementById("category").value;
    let sR = (cat==='female')?0.05:(cat==='female_sc'||cat==='disabled')?0.04:(cat==='trans')?0.01:0.06;
    
    let stamp = Math.round(val * sR);
    let sur = Math.round(stamp * (val >= 1000000 ? 0.33 : 0.30));
    let reg = Math.min(Math.round(val * 0.01), 400000);
    let total = stamp + sur + reg + si + 500;

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("resVal").innerText = "₹" + Math.round(val).toLocaleString('en-IN');
    document.getElementById("resStamp").innerText = "₹" + stamp.toLocaleString('en-IN');
    document.getElementById("resSur").innerText = "₹" + sur.toLocaleString('en-IN');
    document.getElementById("resReg").innerText = "₹" + reg.toLocaleString('en-IN');
    document.getElementById("resSI").innerText = "₹" + si.toLocaleString('en-IN');
    document.getElementById("resTotal").innerText = "₹" + Math.round(total).toLocaleString('en-IN');
}
